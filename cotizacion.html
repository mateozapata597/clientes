        <p>Estamos listos para elevar tu fachada</p>

        <div class="cotizacion-grid">
            <!-- Formulario conectado a Formspree -->
            <form action="https://formspree.io/f/mlgvawyn" method="POST" class="columna-datos">

                <label>Nombre persona o empresa:</label>
                <input type="text" name="nombre" required>

                <label>Correo electrónico:</label>
                <input type="email" name="email" required>

                <label>Número de contacto:</label>
                <input type="tel" name="telefono">

                <label>¿En qué servicio estas interesado(a)?:</label>
                <input type="text" name="servicio">

                <p><strong>Mensaje:</strong></p>
                <label>1. Dirección o zona del inmueble (Barrio):</label>
                <input type="text" name="direccion">

                <label>2. Que necesitas:</label>
                <textarea name="necesidad" rows="3" required></textarea>

                <button type="submit" class="btn-enviar">ENVIAR</button>
            </form>

            <div class="columna-img">
                <img src="cotizacion.jpg" class="img-derecha">
            </div>
